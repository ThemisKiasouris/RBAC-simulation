version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: proj
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: 1230
      MYSQL_DATABASE: Linux-Users
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: